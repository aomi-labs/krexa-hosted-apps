[app]
name         = "cecilia-test-2"          # slug — kebab-case, becomes the release tag
display_name = "Cecilia Test 2"          # human-readable
platform     = "krexa"
git          = "https://github.com/aomi-labs/krexa-hosted-apps"
public       = true                     # visible to all backend users

